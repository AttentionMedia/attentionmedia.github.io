<!DOCTYPE html>
<html class="staticrypt-html">
  <head>
    <meta charset="utf-8" />
    <title>Access Required — AttentionMedia</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta http-equiv="cache-control" content="no-cache" />
    <meta http-equiv="expires" content="0" />
    <meta http-equiv="pragma" content="no-cache" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet" />

    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      .staticrypt-html,
      .staticrypt-body {
        height: 100%;
      }

      .staticrypt-body {
        background-color: #1A1B1A;
        font-family: 'Inter', 'Arial', sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      /* Spinner */
      .staticrypt-spinner-container {
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .staticrypt-spinner {
        display: inline-block;
        width: 2rem;
        height: 2rem;
        border: 3px solid rgba(170, 135, 73, 0.3);
        border-right-color: #AA8749;
        border-radius: 50%;
        animation: spinner-border 0.75s linear infinite;
      }

      @keyframes spinner-border {
        100% { transform: rotate(360deg); }
      }

      /* Layout */
      .staticrypt-content {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 40px 20px;
        position: relative;
        overflow: hidden;
      }

      /* Decorative hexagon */
      .hex-bg {
        position: fixed;
        bottom: -80px;
        right: -60px;
        opacity: 0.07;
        pointer-events: none;
      }

      .hex-bg-top {
        position: fixed;
        top: -100px;
        left: -80px;
        opacity: 0.05;
        pointer-events: none;
      }

      /* Card */
      .staticrypt-form {
        background: #222320;
        border: 1px solid rgba(170, 135, 73, 0.2);
        width: 100%;
        max-width: 420px;
        padding: 48px 40px 40px;
        position: relative;
        z-index: 1;
      }

      /* Logo */
      .am-logo {
        margin-bottom: 32px;
      }

      .am-logo-img {
        height: 28px;
        width: auto;
        display: block;
      }

      /* Divider */
      .am-rule {
        border: none;
        border-top: 1px solid rgba(170, 135, 73, 0.35);
        margin-bottom: 28px;
      }

      /* Headings */
      .am-heading {
        font-size: 22px;
        font-weight: 700;
        color: #F4F6F9;
        margin-bottom: 8px;
        letter-spacing: -0.3px;
      }

      .am-subtext {
        font-size: 13px;
        font-weight: 300;
        color: rgba(244, 246, 249, 0.55);
        line-height: 1.6;
        margin-bottom: 28px;
      }

      /* Password input */
      .staticrypt-password-container {
        position: relative;
        background: rgba(226, 228, 232, 0.08);
        border: 1px solid rgba(226, 228, 232, 0.15);
        margin-bottom: 16px;
        transition: border-color 0.2s;
      }

      .staticrypt-password-container:focus-within {
        border-color: #AA8749;
      }

      .staticrypt-form input[type="password"],
      .staticrypt-form input[type="text"] {
        background: transparent;
        border: none;
        outline: none;
        width: 100%;
        padding: 14px 44px 14px 16px;
        font-size: 14px;
        font-family: inherit;
        color: #F4F6F9;
        letter-spacing: 0.5px;
      }

      .staticrypt-form input[type="password"]::placeholder,
      .staticrypt-form input[type="text"]::placeholder {
        color: rgba(244, 246, 249, 0.3);
        letter-spacing: 0;
      }

      .staticrypt-toggle-password-visibility {
        cursor: pointer;
        position: absolute;
        right: 12px;
        top: 50%;
        transform: translateY(-50%);
        width: 18px;
        height: 18px;
        opacity: 0.35;
        filter: invert(1);
        transition: opacity 0.2s;
      }

      .staticrypt-toggle-password-visibility:hover {
        opacity: 0.6;
      }

      /* Submit button */
      .staticrypt-decrypt-button {
        width: 100%;
        background: #AA8749;
        border: none;
        padding: 14px;
        color: #1A1B1A;
        font-size: 13px;
        font-family: inherit;
        font-weight: 700;
        letter-spacing: 1.5px;
        text-transform: uppercase;
        cursor: pointer;
        transition: background 0.2s;
        margin-top: 4px;
      }

      .staticrypt-decrypt-button:hover,
      .staticrypt-decrypt-button:focus {
        background: #c09a56;
        outline: none;
      }

      /* Remember me */
      label.staticrypt-remember {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 16px;
        font-size: 12px;
        color: rgba(244, 246, 249, 0.45);
        cursor: pointer;
      }

      .staticrypt-remember input[type="checkbox"] {
        accent-color: #AA8749;
        width: 14px;
        height: 14px;
        flex-shrink: 0;
      }

      /* Footer */
      .am-footer {
        margin-top: 24px;
        font-size: 11px;
        color: rgba(244, 246, 249, 0.2);
        text-align: center;
        letter-spacing: 0.5px;
        position: relative;
        z-index: 1;
      }

      .hidden { display: none !important; }

      @media screen and (max-width: 480px) {
        .staticrypt-form { padding: 36px 28px 32px; }
      }
    </style>
